# Cloudflare Worker config for impact-a2a.
#
# Local dev:  wrangler dev (reads .dev.vars for secrets + Anvil contract addrs)
# Production: wrangler deploy (uses [vars] + secrets set via `wrangler secret put`)
#
# Durable Object SESSIONS holds the SessionStore (one global instance for the
# testnet; production would shard per-user via idFromName(walletAddress)).
#
# nodejs_compat is on so our @agenticprimitives/* packages can keep using
# `process.env`, `Buffer`, and the Web-Crypto interfaces they already use.

name = "impact-a2a"
main = "src/index.ts"
compatibility_date = "2026-05-19"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8797
local_protocol = "http"

[durable_objects]
bindings = [
  { name = "SESSIONS", class_name = "SessionStoreDO" },
  { name = "A2A_TASKS", class_name = "A2aTaskDO" },
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionStoreDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["A2aTaskDO"]

[vars]
RPC_URL = "http://127.0.0.1:8545"
CHAIN_ID = "31337"
ALLOWED_ORIGINS = "http://127.0.0.1:5173,http://localhost:5173"
MCP_URL = "http://127.0.0.1:8788"

# Contract addresses + secrets live in .dev.vars (gitignored) for local dev.

# ──────────────────────────────────────────────────────────────────────────
# Production environment — Worker name: "impact-a2a-production"
#
# Deploy via `pnpm deploy:cloudflare` (scripts/deploy-cloudflare.ts), which
# wraps `wrangler deploy --env production` with `--var` flags for contract
# addresses (from deployments-base-sepolia.json) and the just-deployed
# impact-mcp URL.
#
# Secrets are set ONCE per environment via:
#   wrangler secret put SESSION_JWT_SECRETS    --env production
#   wrangler secret put CSRF_SECRET            --env production
#   wrangler secret put A2A_SESSION_SECRET     --env production
#   wrangler secret put A2A_MASTER_PRIVATE_KEY --env production
#   wrangler secret put A2A_MAC_SECRET         --env production   # R7.4 — shared with impact-mcp
#
# A2A_MAC_SECRET is the HMAC key that binds the a2a→mcp service envelope
# (audience + service + route + nonce + timestamp + body digest). impact-mcp
# rejects every call when this is unset on the producer side. The SAME
# value must be set on impact-mcp via the same `wrangler secret put` command.
# The preflight (scripts/check-production-deploy.ts N10.1) refuses deploys
# when this declaration is absent.
#
# Non-inheritable keys (vars, durable_objects, kv, d1, etc.) must be
# re-declared per environment — that's why this block repeats the DO binding.
# ──────────────────────────────────────────────────────────────────────────

[env.production]
# NOTE: impact-a2a's `*.churchcore.me` route is intentionally DROPPED here — that route is
# already owned by impact-a2a-production, and impact reaches this worker via its workers.dev URL
# (the impact app's next.config `/a2a/*` rewrite → IMPACT_A2A_URL). impact-a2a is served on
# `impact-a2a-production.<acct>.workers.dev`. If impact ever needs A2A-by-subdomain on its own
# zone, add a `routes` block for THAT domain (e.g. `*.churchcore.me`) here.
workers_dev = true

[env.production.vars]
# RPC_URL intentionally omitted — set as a secret instead so the value
# (which may embed an API key for a paid RPC provider like Alchemy /
# Infura) doesn't end up in the tracked wrangler.toml. Configure with:
#   echo "<rpc-url>" | wrangler secret put RPC_URL --env production
CHAIN_ID = "84532"
# These two are placeholders — `pnpm deploy:cloudflare` overrides via `--var`
# with the freshly-deployed Pages URL + impact-mcp Worker URL. Defaults left
# blank so a misconfigured deploy fails closed (no CORS allowed, no MCP).
ALLOWED_ORIGINS = ""
MCP_URL = ""
# Signer backend selection. EXPLICIT default — there is NO silent fallback
# inside @agenticprimitives/key-custody (ADR-0013 / feedback_no_silent_fallbacks),
# so an empty string here means "misconfigured" and the topup / relayer /
# custody routes WILL throw `[key-custody] No backend specified for production`
# impact-a2a signs via Cloud KMS (NO held key — [[no-held-keys-rule]]). The signer is the
# secp256k1 key `smart-agent-2` (address 0x3C7B58062f1c472f16eD843808fd95DA4697b702);
# GCP_SERVICE_ACCOUNT_JSON (content-signer SA) is a wrangler secret. `pnpm deploy:impact`
# also accepts A2A_KMS_BACKEND/GCP_KMS_KEY_NAME via env to override these.
A2A_KMS_BACKEND = "gcp-kms"
GCP_KMS_KEY_NAME = "projects/churchcore2/locations/us-central1/keyRings/agenticprimitives-demo/cryptoKeys/smart-agent-2/cryptoKeyVersions/1"
# A2A_ALLOW_LOCAL_MASTER_KEY: opt-in for the dev-only LocalSecp256k1Signer
# (which loads A2A_MASTER_PRIVATE_KEY into worker memory) to run in
# NODE_ENV=production. Required on testnet because esbuild's --define
# bakes NODE_ENV='production' at build time, so the runtime guard fires
# unconditionally without this opt-in. Production stacks with real-value
# keys MUST replace this with A2A_KMS_BACKEND=gcp-kms before this flag
# is removed. The signer logs a loud one-time warning when this flag is in
# use. See packages/key-custody/AUDIT.md → KC-3.
A2A_ALLOW_LOCAL_MASTER_KEY = "true"
# A2A_ALLOW_LOCAL_ENVELOPE_KEY: opt-in for LocalAesProvider's HKDF-AES
# session-data-key wrap/unwrap (the envelope crypto under
# delegation.SessionManager). Same shape as A2A_ALLOW_LOCAL_MASTER_KEY
# but a stricter threat model: compromise of the wrangler-secret
# master = decrypt every session keypair at rest = forge delegations.
# Acceptable on testnet (test keys, ephemeral DOs); MUST be replaced
# by A2A_KMS_BACKEND=gcp-kms + GCP_KMS_ENCRYPT_KEY_NAME before any
# real-value keys land. See packages/key-custody/AUDIT.md → KC-3.
# ENABLED — the alpha.13 GcpKmsProvider has a session-envelope AAD round-trip bug (encrypt AAD uses
# keyVersion 'gcp-kms:unknown' but decrypt AAD uses the response-parsed 'gcp-kms:vN' → KMS HTTP 400),
# so SessionManager wraps the EPHEMERAL token-signing key via local-aes (HKDF under A2A_SESSION_SECRET)
# instead. This is a token-auth key, not an on-chain signer, so [[no-held-keys-rule]] (relayer/userOp
# signers) is unaffected — those stay gcp-kms. Revisit when key-custody ships the AAD fix.
A2A_ALLOW_LOCAL_ENVELOPE_KEY = "true"
# GCP_KMS_ENCRYPT_KEY_NAME: symmetric Cloud KMS key for session-data-key envelope encryption.
# Set → GcpKmsProvider Encrypt/Decrypt instead of LocalAesProvider's HKDF-from-local-secret.
# Uses the `agent-envelope` symmetric key (SA encrypt/decrypt verified).
GCP_KMS_ENCRYPT_KEY_NAME = "projects/churchcore2/locations/us-central1/keyRings/agenticprimitives-demo/cryptoKeys/agent-envelope"
# PAYMASTER: SmartAgentPaymaster contract address. When set, impact-a2a
# enables the /session/deploy endpoints; the web client shows the Step 1.5
# "Deploy smart account" prompt and the user's smart account is deployed
# via a paymaster-sponsored UserOp on first SIWE login. When empty,
# /session/deploy returns 409 and it falls back to counterfactual
# mode (requireDeployed:false in impact-mcp).
PAYMASTER = ""
# PAYMASTER_VERIFYING_SIGNER: address that impact-a2a must sign paymaster
# envelopes for. MUST match SmartAgentPaymaster.verifyingSigner() on-chain;
# /session/deploy appends a 77-byte verifying-paymaster signature using
# the master KMS account when this is set. When unset, paymasterAndData
# is built without a signature (acceptable only if paymaster is in
# allowlist/dev mode). Realigned on-chain 2026-05-20 to the impact-a2a
# master signer's address; tracked under audit C2.
# impact-a2a's own gcp-kms signer address (smart-agent-2). Self-consistent so the appended
# verifying-paymaster signature is signed by the same address it claims. Moot while the
# on-chain smartAgentPaymaster is devMode=true (no signer check), but correct going forward.
PAYMASTER_VERIFYING_SIGNER = "0x3C7B58062f1c472f16eD843808fd95DA4697b702"
# UNIVERSAL_SIGNATURE_VALIDATOR: address of the on-chain ECDSA/ERC-1271/
# ERC-6492 verifier deployed by Deploy.s.sol. When set, /auth/siwe-verify
# uses the validator (required for the passkey path — spec 130). When
# unset, falls back to legacy ECDSA-only recovery (EOA flow only).
# Injected via --var at deploy time by scripts/deploy-cloudflare.ts.
UNIVERSAL_SIGNATURE_VALIDATOR = ""
# Contract addresses (ENTRY_POINT, DELEGATION_MANAGER, etc.) likewise injected
# at deploy time via --var from deployments-base-sepolia.json.

[env.production.durable_objects]
bindings = [
  { name = "SESSIONS", class_name = "SessionStoreDO" },
  { name = "A2A_TASKS", class_name = "A2aTaskDO" },
]

# impact-a2a's OWN KV namespaces (provisioned 2026-06-25 via `wrangler kv namespace create
# impact-a2a-BRIDGE_NONCES` / `impact-a2a-FED_TOKENS`) — separate state from impact-a2a.
#
# Bridge anti-replay nonce store (audit M-1): single-use bridge-envelope nonces recorded across isolates
# (the per-isolate in-memory Map caught nothing cross-isolate). TTL'd presence keys via `nonceStoreFromKv`.
[[env.production.kv_namespaces]]
binding = "BRIDGE_NONCES"
id = "6fac282a54014ecd830ade15f9d28785"

# Federated user-data tokens (spec 265): per-person YouVersion OAuth access/refresh tokens, KMS-encrypted
# at rest (envelope), keyed by person SA. Read ONLY server-side by the youversion read-proxy — never
# returned to a relying app or grantee.
[[env.production.kv_namespaces]]
binding = "FED_TOKENS"
id = "6fa48cfb73a044f4ba15945c29b8cd25"

# Service binding: impact-a2a → impact-mcp. Cloudflare blocks direct
# fetch(*.workers.dev) between sibling Workers on the same account
# with error 1042 (recursion/loop protection). Service bindings are
# the canonical fix — calls flow through Cloudflare's internal
# routing, never touching the public edge.
[[env.production.services]]
binding = "MCP"
service = "impact-mcp-production"
