# Cloudflare Worker config for demo-bible-a2a.
# Local dev: wrangler dev --port 8791 (calls demo-bible-mcp at MCP_URL).

name = "demo-bible-a2a"
main = "src/index.ts"
compatibility_date = "2026-05-19"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8791
local_protocol = "http"

[vars]
MCP_URL = "http://127.0.0.1:8790"

[env.production]
workers_dev = true

[env.production.vars]
MCP_URL = "https://demo-bible-mcp-production.richardpedersen3.workers.dev"

# Worker-to-Worker via a service binding (avoids CF error 1042).
[[env.production.services]]
binding = "MCP"
service = "demo-bible-mcp-production"
